name: Sync Detection Rules

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip push to main)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  sync-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/sync-detection-rules/requirements.txt

      - name: Sync detection rules
        id: sync
        run: |
          python .github/scripts/sync-detection-rules/sync_rules.py --verbose

      - name: Commit and push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add solutions/security/detect-and-alert/prebuilt-rule-catalog/
          git add solutions/security/detect-and-alert/prebuilt-rule-guides/
          git add solutions/toc.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update prebuilt detection rules (catalog, guides, TOC)

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin main

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: detection-rules-sync-${{ github.run_number }}
          path: |
            solutions/security/detect-and-alert/prebuilt-rule-catalog/*.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Generate job summary
        if: always()
        run: |
          echo "## Detection Rules Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### CSV files" >> $GITHUB_STEP_SUMMARY
          for csv_path in solutions/security/detect-and-alert/prebuilt-rule-catalog/*.csv; do
            [ -f "$csv_path" ] || continue
            row_count=$(($(wc -l < "$csv_path") - 1))
            echo "- **${csv_path}**: ${row_count} rules" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Investigation guides" >> $GITHUB_STEP_SUMMARY
          guide_count=$(find solutions/security/detect-and-alert/prebuilt-rule-guides -name '*.md' 2>/dev/null | wc -l)
          echo "- **Total guide pages**: ${guide_count}" >> $GITHUB_STEP_SUMMARY
